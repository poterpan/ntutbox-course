name: crawl details

# 每週日 05:30 Asia/Taipei（= 21:30 UTC，台北無 DST）爬「當前學期」課綱詳情 + 手動全量。
# 詳情量大(~5k 請求/學期)、學期內變動慢 → 週更即足夠；刻意錯開每日 catalog crawl（20:00 UTC）。
# 無 push trigger → 對 data branch 的 commit 不會自迴圈。
on:
  schedule:
    - cron: "30 21 * * 0"
  workflow_dispatch:
    inputs:
      terms:
        description: "學期（如 115-1 或 110-1:115-1）；留空＝自動偵測當前學期"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: data-pipeline   # 與 crawl.yml / crawl-enrollment.yml 共用 → 序列化，不撞 data branch / R2
  cancel-in-progress: false

jobs:
  crawl-details:
    runs-on: ubuntu-latest
    env:
      R2_BUCKET: ${{ vars.R2_BUCKET }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout code (main)
        uses: actions/checkout@v4

      - name: Checkout canonical (data branch)
        uses: actions/checkout@v4
        with:
          ref: data
          path: data/canonical

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install crawler
        run: pip install -e ./crawler

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install wrangler
        run: npm install -g wrangler@4

      # 不可信輸入只經由 env 注入，不直接插入 shell（防 command injection）
      # 排程（無 INPUT_TERMS）＝永遠只跟「當前學期」：詳情週更每學期 ~5k 請求，
      # 刻意不吃 vars.ACTIVE_TERMS（它一旦被設成範圍，週更就會突然爬全歷史）。
      # 補爬走手動 dispatch 的 INPUT_TERMS（保留 110-1:115-1 範圍語法）。
      - name: Resolve terms
        id: terms
        env:
          INPUT_TERMS: ${{ github.event.inputs.terms }}
        run: |
          set -euo pipefail
          T="$INPUT_TERMS"
          if [ -z "$T" ]; then
            T="$(python -m ntut_catalog current-term)"
            echo "auto-detected current term: $T"
          else
            echo "$T" | grep -Eq '^[0-9]{3}-[123]([:,][0-9]{3}-[123])*$' || { echo "invalid terms: $T"; exit 1; }
          fi
          echo "terms=$T" >> "$GITHUB_OUTPUT"

      # 詳情 ~5k 請求/學期、逐課打 Curr.jsp + ShowSyllabus.jsp → timeout 放寬到 180 分
      - name: Crawl details
        timeout-minutes: 180
        env:
          TERMS: ${{ steps.terms.outputs.terms }}
        run: |
          set -euo pipefail
          python -m ntut_catalog crawl-detail --terms "$TERMS" --out data

      - name: Redline scan (block PII/secrets/error pages)
        run: python infra/redline_scan.py data/canonical

      # 新造字監測：發現 PUA_MAP 未收錄碼位 → fail-loud 紅標但不擋管線（commit/publish 照常）。
      # 處置：照 docs/research/2026-07-20-pua-glyph-verification.md 的 GServer 流程考證補 PUA_MAP。
      - name: PUA scan (新造字監測)
        continue-on-error: true
        env:
          TERMS: ${{ steps.terms.outputs.terms }}
        run: |
          set -euo pipefail
          python -m ntut_catalog pua-scan --terms "$TERMS" --out data

      - name: Commit details to data branch
        working-directory: data/canonical
        env:
          TERMS: ${{ steps.terms.outputs.terms }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          DATE="$(TZ=Asia/Taipei date +%F)"
          git add -- '*/details.ndjson' || true
          git diff --cached --quiet || git commit -m "data(details): $TERMS $DATE"
          git pull --rebase origin data || true
          git push origin HEAD:data

      # 帶 --include-details 上傳 course/{id}.json（本 workflow 存在的意義）
      - name: Publish v1 to R2 (with details)
        env:
          TERMS: ${{ steps.terms.outputs.terms }}
        run: |
          python infra/publish.py \
            --bucket "$R2_BUCKET" \
            --terms "$TERMS" \
            --include-details \
            --out data \
            --generated-at "$(date -u +%FT%TZ)"
