name: publish v1 to R2

# 手動：從 data branch 重建完整 v1 並發佈到 R2（含/不含 course 詳情）。
# 用於：首次/重新全量發佈、補發詳情（syllabus）等。不爬學校，只 build + 上傳。
on:
  workflow_dispatch:
    inputs:
      terms:
        description: "學期（如 115-1）；留空＝全部"
        required: false
        default: ""
      include_details:
        description: "是否上傳 course/{id}.json 詳情（量大、慢）"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: data-pipeline
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      R2_BUCKET: ${{ vars.R2_BUCKET }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      INPUT_TERMS: ${{ github.event.inputs.terms }}
      INPUT_DETAILS: ${{ github.event.inputs.include_details }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          ref: data
          path: data/canonical
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install crawler
        run: pip install -e ./crawler
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install wrangler
        run: npm install -g wrangler@4
      - name: Publish
        run: |
          set -euo pipefail
          ARGS="--bucket $R2_BUCKET --out data --generated-at $(date -u +%FT%TZ)"
          if [ -n "$INPUT_TERMS" ]; then
            echo "$INPUT_TERMS" | grep -Eq '^[0-9]{3}-[123]([,][0-9]{3}-[123])*$' || { echo "invalid terms"; exit 1; }
            ARGS="$ARGS --terms $INPUT_TERMS"
          else
            ARGS="$ARGS --all"
          fi
          if [ "$INPUT_DETAILS" = "true" ]; then ARGS="$ARGS --include-details"; fi
          python infra/publish.py $ARGS
