<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Noto Sans TC", sans-serif;
    color: #141a24;
    display: flex; align-items: center; gap: 48px;
    padding: 0 72px;
    background:
      radial-gradient(1100px 760px at 8% -12%, rgba(108,162,255,.34), transparent 58%),
      radial-gradient(980px 720px at 112% 4%, rgba(176,140,255,.26), transparent 55%),
      radial-gradient(880px 900px at 52% 118%, rgba(96,214,198,.26), transparent 60%),
      linear-gradient(180deg, #eef2fb 0%, #e6ebf6 48%, #e9eaf3 100%);
  }
  .brand { flex: 1 1 0; }
  /* Icon Composer 匯出的白底圓角磚（squircle 滿版、角落為黑）：
     border-radius ≈ iOS 22.37% 弧度即可把黑角裁乾淨（CSS 圓弧略內於 squircle，不會漏黑）。 */
  .brand img { width: 132px; height: 132px; border-radius: 23%; box-shadow: 0 18px 40px rgba(20,40,90,.18); }
  .brand h1 { margin-top: 34px; font-size: 76px; font-weight: 800; letter-spacing: 1px; }
  .brand h1 .accent { color: #2563eb; }
  .brand p { margin-top: 18px; font-size: 30px; color: #4c5768; font-weight: 500; letter-spacing: 2px; }
  /* 右側：迷你週課表玻璃卡 */
  .card {
    flex: 0 0 480px; height: 468px; padding: 26px;
    background: rgba(255,255,255,.72);
    border: 1px solid rgba(255,255,255,.85);
    border-radius: 34px;
    box-shadow: 0 30px 70px rgba(30,50,100,.20);
    transform: rotate(2.5deg);
    display: grid; grid-template-columns: repeat(5, 1fr); grid-template-rows: repeat(5, 1fr); gap: 10px;
  }
  .cell { background: rgba(255,255,255,.5); border: 1px solid rgba(20,26,36,.06); border-radius: 14px; }
  .blk {
    border-radius: 14px; border: 0;
    background: linear-gradient(135deg, #38bdf8, #3b82f6);
    box-shadow: 0 8px 18px rgba(59,130,246,.35);
  }
  .blk.tall { grid-row: span 2; }
  .blk.orange { background: linear-gradient(135deg, #fbbf24, #f97316); box-shadow: 0 8px 18px rgba(249,115,22,.35); }
</style>
</head>
<body>
  <div class="brand">
    <img src="icon-tile.jpg" alt="">
    <h1>北科盒子 <span class="accent">排課</span></h1>
    <p>查課・排週課表・衝堂學分即時檢查</p>
  </div>
  <div class="card">
    <div class="blk tall"></div><div class="cell"></div><div class="blk"></div><div class="cell"></div><div class="blk"></div>
    <div class="cell"></div><div class="blk orange"></div><div class="cell"></div><div class="blk tall"></div><div class="cell"></div>
    <div class="blk"></div><div class="cell"></div><div class="blk tall"></div><div class="cell"></div><div class="blk"></div>
    <div class="cell"></div><div class="blk"></div><div class="cell"></div><div class="cell"></div><div class="blk"></div>
    <div class="cell"></div><div class="blk"></div>
  </div>
</body>
</html>
